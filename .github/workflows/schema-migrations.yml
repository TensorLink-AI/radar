name: Schema migrations

"on":
  pull_request:
    paths:
      - 'shared/pg_schema.py'
      - 'shared/migrations.py'
      - 'database/migrations/**'
      - 'tests/test_migrations.py'

jobs:
  migration-required:
    name: Schema change requires migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for missing migration
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -q '^shared/pg_schema.py$'; then
            NEW=$(git diff --name-only --diff-filter=A \
                    origin/${{ github.base_ref }}...HEAD \
                    | grep '^database/migrations/.*\.sql$' || true)
            if [ -z "$NEW" ]; then
              echo "::error::pg_schema.py changed but no new migration added"
              exit 1
            fi
          fi

  apply-fresh:
    name: Migrations apply to empty DB
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: radar_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - name: Apply migrations to empty testnet schema
        env:
          PGPASSWORD: testpw
          RADAR_PG_DSN: postgresql://postgres:testpw@localhost:5432/radar_test?sslmode=disable
        run: |
          python -c "
          import asyncio, asyncpg, os
          from shared.migrations import apply_migrations

          async def main():
              conn = await asyncpg.connect(os.environ['RADAR_PG_DSN'])
              await conn.execute('CREATE SCHEMA IF NOT EXISTS testnet')
              applied = await apply_migrations(conn, 'testnet')
              print(f'Applied: {applied}')
              # Run again — must be a no-op.
              applied_again = await apply_migrations(conn, 'testnet')
              assert applied_again == [], f'Expected empty, got {applied_again}'

          asyncio.run(main())
          "

  no-destructive-without-flag:
    name: Block destructive migrations without approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan new migrations for destructive patterns
        env:
          # Pass the PR body via env rather than ${{ }} interpolation —
          # bodies routinely contain backticks, $vars, and quotes that
          # break the runner's bash script when interpolated raw (the
          # script source ends up containing PR-body text and bash treats
          # backticks as command substitution). See PR #142 (TEN-240
          # Phase 7) which tripped exit code 2 from a backtick-rich body.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          NEW=$(git diff --diff-filter=A origin/${{ github.base_ref }}...HEAD \
                  -- 'database/migrations/*.sql' || true)
          if [ -z "$NEW" ]; then
            echo "No new migrations."
            exit 0
          fi
          CONTENT=$(git diff --diff-filter=A origin/${{ github.base_ref }}...HEAD \
                      -- 'database/migrations/*.sql')
          if echo "$CONTENT" | grep -iE '^\+.*(DROP TABLE|DROP COLUMN|ALTER COLUMN [^,;]+ TYPE)' > /dev/null; then
            if ! printf '%s' "$PR_BODY" | grep -q "ALLOW_DESTRUCTIVE"; then
              echo "::error::Destructive migration detected. Add 'ALLOW_DESTRUCTIVE' to the PR description to approve."
              exit 1
            fi
          fi

  tests:
    name: Migration tests pass
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: radar_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e . pytest pytest-asyncio
      - name: Run migration tests
        env:
          TEST_PG_DSN: postgresql://postgres:testpw@localhost:5432/radar_test?sslmode=disable
        run: pytest tests/test_migrations.py -v
