<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>radar — dashboard</title>
<style>
  :root { color-scheme: dark; }
  body { font: 13px/1.4 ui-monospace, Menlo, monospace; margin: 0; padding: 16px;
         background: #0e0f12; color: #d5d7dc; }
  h1, h2 { font-weight: 600; margin: 0 0 8px; }
  h1 { font-size: 18px; }
  h2 { font-size: 14px; margin-top: 20px; color: #9aa0aa; text-transform: uppercase;
       letter-spacing: 0.05em; }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat { background: #161820; border: 1px solid #232631; padding: 8px 12px;
          border-radius: 4px; min-width: 110px; }
  .stat .k { color: #777e8b; font-size: 11px; text-transform: uppercase; }
  .stat .v { font-size: 18px; color: #e8eaf0; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #1c1f28; }
  th { color: #9aa0aa; font-weight: 500; font-size: 11px; text-transform: uppercase; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: #1a1d26; }
  td.metric, td.score, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.fail { color: #ff6b6b; }
  td.ok { color: #7ec97e; }
  .rank { color: #777e8b; width: 32px; }
  canvas { background: #161820; border: 1px solid #232631; border-radius: 4px;
           display: block; margin-top: 6px; }
  #detail { position: fixed; right: 0; top: 0; bottom: 0; width: 50%;
            background: #0a0b0e; border-left: 1px solid #232631; padding: 16px;
            overflow: auto; display: none; }
  #detail.open { display: block; }
  #detail pre { background: #161820; padding: 8px; border-radius: 4px;
                white-space: pre-wrap; word-break: break-word; font-size: 12px; }
  #detail .close { float: right; cursor: pointer; color: #9aa0aa; }
  .muted { color: #777e8b; }
  .refresh { float: right; color: #777e8b; font-size: 11px; }
</style></head>
<body>
<div class="refresh" id="refresh">—</div>
<h1>radar local — dashboard</h1>
<div class="stats" id="stats"></div>

<h2>Leaderboard <span class="muted" id="lb-count"></span></h2>
<table><thead><tr>
  <th class="rank">#</th><th>id</th><th>round</th><th>miner</th><th>name</th>
  <th class="num">metric</th><th class="num">crps</th><th class="num">mase</th>
  <th class="num">flops</th><th class="num">score</th>
</tr></thead><tbody id="leaderboard"></tbody></table>

<h2>Pareto frontier (metric × flops)</h2>
<canvas id="pareto" width="900" height="320"></canvas>
<table><thead><tr>
  <th>id</th><th>miner</th><th class="num">flops</th>
  <th class="num">metric</th><th class="num">crps</th><th class="num">mase</th>
</tr></thead><tbody id="frontier"></tbody></table>

<h2>Recent</h2>
<table><thead><tr>
  <th>id</th><th>round</th><th>miner</th><th>name</th>
  <th class="num">metric</th><th class="num">score</th><th>ok</th>
</tr></thead><tbody id="recent"></tbody></table>

<div id="detail"></div>

<script>
const fmt = (x, d=4) => x === null || x === undefined ? '—'
  : (typeof x === 'number' ? x.toFixed(d) : x);
const fmtInt = x => x === null || x === undefined ? '—'
  : Number(x).toLocaleString();
const obj = (e, k) => (e.objectives && e.objectives[k] !== undefined) ? e.objectives[k] : null;
const esc = s => String(s == null ? '' : s).replace(/[&<>]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function get(p) { const r = await fetch(p); return r.json(); }

function row(e, rank) {
  const tr = document.createElement('tr');
  tr.className = 'row';
  tr.onclick = () => showDetail(e.id);
  tr.innerHTML = (rank !== undefined ? `<td class="rank">${rank}</td>` : '')
    + `<td>${e.id}</td><td>${e.round_id}</td>`
    + `<td>${esc(e.miner_id)}</td><td>${esc(e.name)}</td>`
    + `<td class="metric">${fmt(e.metric)}</td>`
    + `<td class="num">${fmt(obj(e, 'crps'))}</td>`
    + `<td class="num">${fmt(obj(e, 'mase'))}</td>`
    + `<td class="num">${fmtInt(obj(e, 'flops_equivalent_size'))}</td>`
    + `<td class="score">${fmt(e.score, 3)}</td>`;
  return tr;
}

function recentRow(e) {
  const tr = document.createElement('tr');
  tr.className = 'row';
  tr.onclick = () => showDetail(e.id);
  tr.innerHTML = `<td>${e.id}</td><td>${e.round_id}</td>`
    + `<td>${esc(e.miner_id)}</td><td>${esc(e.name)}</td>`
    + `<td class="metric">${fmt(e.metric)}</td>`
    + `<td class="score">${fmt(e.score, 3)}</td>`
    + (e.success ? `<td class="ok">ok</td>` : `<td class="fail">fail</td>`);
  return tr;
}

function frontRow(e) {
  const tr = document.createElement('tr');
  tr.className = 'row';
  tr.onclick = () => showDetail(e.id);
  tr.innerHTML = `<td>${e.id}</td><td>${esc(e.miner_id)}</td>`
    + `<td class="num">${fmtInt(obj(e, 'flops_equivalent_size'))}</td>`
    + `<td class="num">${fmt(e.metric)}</td>`
    + `<td class="num">${fmt(obj(e, 'crps'))}</td>`
    + `<td class="num">${fmt(obj(e, 'mase'))}</td>`;
  return tr;
}

function drawPareto(front, all) {
  const c = document.getElementById('pareto');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#161820'; ctx.fillRect(0, 0, c.width, c.height);
  const points = all.filter(e => e.success && e.metric !== null);
  if (points.length === 0) return;
  const xs = points.map(e => Math.max(1, obj(e, 'flops_equivalent_size') || 1));
  const ys = points.map(e => e.metric);
  const xMin = Math.log10(Math.min(...xs)), xMax = Math.log10(Math.max(...xs) + 1);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const pad = 30;
  const xRange = Math.max(1e-6, xMax - xMin), yRange = Math.max(1e-6, yMax - yMin);
  const px = x => pad + (Math.log10(Math.max(1, x)) - xMin) / xRange * (c.width - 2 * pad);
  const py = y => c.height - pad - (y - yMin) / yRange * (c.height - 2 * pad);
  ctx.fillStyle = '#3a4050';
  for (const e of points) {
    ctx.beginPath();
    ctx.arc(px(obj(e, 'flops_equivalent_size') || 1), py(e.metric), 3, 0, 2*Math.PI);
    ctx.fill();
  }
  ctx.strokeStyle = '#7ec97e'; ctx.fillStyle = '#7ec97e'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  front.forEach((e, i) => {
    const x = px(obj(e, 'flops_equivalent_size') || 1), y = py(e.metric);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  for (const e of front) {
    ctx.beginPath();
    ctx.arc(px(obj(e, 'flops_equivalent_size') || 1), py(e.metric), 4, 0, 2*Math.PI);
    ctx.fill();
  }
  ctx.fillStyle = '#777e8b'; ctx.font = '11px monospace';
  ctx.fillText('log10(flops) →', c.width - 120, c.height - 10);
  ctx.save(); ctx.translate(12, 80); ctx.rotate(-Math.PI/2);
  ctx.fillText('metric (lower=better) →', 0, 0); ctx.restore();
}

async function showDetail(id) {
  const e = await get(`/api/experiment/${id}`);
  const d = document.getElementById('detail');
  d.className = 'open';
  const objJson = esc(JSON.stringify(e.objectives, null, 2));
  d.innerHTML = `<span class="close" onclick="document.getElementById('detail').className=''">×</span>`
    + `<h2>experiment ${e.id}</h2>`
    + `<div class="muted">round ${e.round_id} · miner ${esc(e.miner_id)} · `
    + `task ${esc(e.task) || '?'} · gen ${e.generation}</div>`
    + `<p><b>name</b> ${esc(e.name)}<br><b>metric</b> ${fmt(e.metric)} `
    + ` <b>score</b> ${fmt(e.score, 3)} <b>success</b> ${e.success}</p>`
    + `<h2>objectives</h2><pre>${objJson}</pre>`
    + `<h2>analysis</h2><pre>${esc(e.analysis)}</pre>`
    + (e.motivation ? `<h2>motivation</h2><pre>${esc(e.motivation)}</pre>` : '')
    + (e.reasoning ? `<h2>reasoning</h2><pre>${esc(e.reasoning)}</pre>` : '')
    + `<h2>loss curve</h2><pre>${esc(JSON.stringify(e.loss_curve))}</pre>`
    + `<h2>code</h2><pre>${esc(e.code)}</pre>`;
}

async function refresh() {
  try {
    const [stats, lb, fr, recent] = await Promise.all([
      get('/api/stats'), get('/api/leaderboard?n=20'),
      get('/api/frontier'), get('/api/recent?n=30'),
    ]);
    const cells = [
      ['total', fmtInt(stats.total)], ['successful', fmtInt(stats.successful)],
      ['failed', fmtInt(stats.failed)], ['miners', fmtInt(stats.n_miners)],
      ['last round', fmtInt(stats.last_round)],
      ['best metric', fmt(stats.best_metric)],
      ['mean metric', fmt(stats.mean_metric)],
    ];
    document.getElementById('stats').innerHTML = cells.map(([k, v]) =>
      `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`
    ).join('');

    const lbEl = document.getElementById('leaderboard');
    lbEl.innerHTML = '';
    lb.forEach((e, i) => lbEl.appendChild(row(e, i + 1)));
    document.getElementById('lb-count').textContent = ` (${lb.length})`;

    const frEl = document.getElementById('frontier');
    frEl.innerHTML = '';
    fr.forEach(e => frEl.appendChild(frontRow(e)));
    drawPareto(fr, lb.concat(recent));

    const rEl = document.getElementById('recent');
    rEl.innerHTML = '';
    recent.forEach(e => rEl.appendChild(recentRow(e)));

    document.getElementById('refresh').textContent =
      'refreshed ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('refresh').textContent = 'error: ' + e;
  }
}
refresh();
setInterval(refresh, 5000);
</script>
</body></html>
