<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Radar Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/dashboard/static/dashboard.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <a href="/dashboard/">Radar</a>
        <span class="tag">dashboard</span>
    </div>
    <nav>
        <a href="/dashboard/">Overview</a>
        <a href="/dashboard/experiments">Experiments</a>
        <a href="/dashboard/pareto">Pareto</a>
        <a href="/dashboard/miners">Miners</a>
        <a href="/dashboard/provenance">Provenance</a>
        <a href="/dashboard/logout" class="muted">logout</a>
    </nav>
</header>
<main class="container">
{% block content %}{% endblock %}
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-diff.min.js"></script>
<script src="/dashboard/static/dashboard.js"></script>
</body>
</html>
